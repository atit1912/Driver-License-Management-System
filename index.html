<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DLMS — ระบบจัดการใบขับขี่</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#F5F4F0;color:#1a1a1a;font-size:14px}
a{text-decoration:none}
button{cursor:pointer;font-family:'Sarabun',sans-serif}
input,select{font-family:'Sarabun',sans-serif}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#fff;border-right:1px solid #E8E6E0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40}
.main{flex:1;margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E8E6E0;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
.content{flex:1;padding:20px;padding-bottom:80px}

/* Sidebar */
.logo{padding:18px 16px 14px;border-bottom:1px solid #F0EEE8;display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:#1565C0;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-text{font-weight:700;font-size:15px;line-height:1.1}
.logo-sub{font-size:10px;color:#999}
nav.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;margin-bottom:2px;font-size:13.5px;font-weight:500;color:#555;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:#F5F4F0}
.nav-item.active{background:#1565C015;color:#1565C0}
.nav-icon{font-size:16px}
.user-bar{padding:12px 16px;border-top:1px solid #F0EEE8;display:flex;align-items:center;gap:8px}
.user-avatar{width:30px;height:30px;border-radius:50%;background:#1565C020;color:#1565C0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}

/* Bottom Nav (mobile) */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E8E6E0;justify-content:space-around;padding:6px 0 8px;z-index:40}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:500;color:#999;border:none;background:none;padding:4px 8px;cursor:pointer;transition:color .15s}
.bnav-item.active{color:#1565C0}
.bnav-icon{font-size:20px}

/* Cards */
.card{background:#fff;border-radius:12px;border:1px solid #E8E6E0;overflow:hidden}
.grid-kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
.kpi-card{background:#fff;border-radius:12px;border:1px solid #E8E6E0;padding:18px 16px}
.kpi-num{font-size:30px;font-weight:700;line-height:1}
.kpi-label{font-size:11px;color:#888;font-weight:500;letter-spacing:.03em;margin-bottom:6px}
.kpi-sub{font-size:11px;color:#bbb;margin-top:3px}
.kpi-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;float:right;margin-top:-4px}

/* Status Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:500;white-space:nowrap;border:1px solid}
.badge-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.badge-sm{padding:2px 7px;font-size:11px}

/* Status colors */
.s-normal{color:#3B6D11;background:#EAF3DE;border-color:#639922}.s-normal .badge-dot{background:#639922}
.s-45d{color:#854F0B;background:#FAEEDA;border-color:#BA7517}.s-45d .badge-dot{background:#EF9F27}
.s-30d{color:#7C3D00;background:#FEF0E6;border-color:#D05538}.s-30d .badge-dot{background:#D05538}
.s-15d{color:#A32D2D;background:#FCEBEB;border-color:#E24B4A}.s-15d .badge-dot{background:#E24B4A}
.s-expired{color:#791F1F;background:#F7C1C1;border-color:#A32D2D}.s-expired .badge-dot{background:#A32D2D}

/* Alert row */
.alert-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;border:1px solid;flex-wrap:wrap;gap:8px;margin-bottom:6px}

/* Employee list */
.emp-row{background:#fff;border-radius:10px;border:1px solid #E8E6E0;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;cursor:pointer;transition:box-shadow .15s;margin-bottom:8px}
.emp-row:hover{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.emp-avatar{width:42px;height:42px;border-radius:50%;background:#1565C015;color:#1565C0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}

/* Tabs */
.tabs{display:flex;background:#fff;border-radius:10px;border:1px solid #E8E6E0;overflow:hidden;margin-bottom:14px}
.tab-btn{flex:1;padding:11px 0;border:none;cursor:pointer;font-size:13px;font-weight:500;background:#fff;color:#555;transition:all .2s;font-family:'Sarabun',sans-serif}
.tab-btn.active{background:#1565C0;color:#fff;font-weight:600}

/* Forms */
.search-wrap{position:relative}
.search-wrap .icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;font-size:14px}
.search-input{width:100%;padding:8px 12px 8px 32px;border:1px solid #E8E6E0;border-radius:8px;font-size:13px;outline:none;background:#FAFAF8;font-family:'Sarabun',sans-serif}
.search-input:focus{border-color:#1565C0}
select.filter-select{padding:7px 10px;border:1px solid #E8E6E0;border-radius:8px;font-size:12px;background:#FAFAF8;color:#333;outline:none;font-family:'Sarabun',sans-serif}
.filter-pill{padding:5px 12px;border:1px solid #E8E6E0;border-radius:20px;font-size:11.5px;background:#fff;color:#555;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s}
.filter-pill.active{background:#1565C0;color:#fff;border-color:#1565C0}

/* Info grid */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.info-val{font-size:13px;color:#333}
.info-val.hl{color:#A32D2D;font-weight:600}

/* Spinner */
.spinner-wrap{display:flex;flex-direction:column;align-items:center;padding:40px;gap:12px}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid #E8E6E0;border-top-color:#1565C0;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Table */
.report-table{width:100%;border-collapse:collapse;font-size:12px}
.report-table th{padding:8px 10px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #E8E6E0;background:#F5F4F0;white-space:nowrap}
.report-table td{padding:8px 10px;border-bottom:1px solid #F5F4F0;color:#333;white-space:nowrap}

/* Bar chart manual */
.bar-track{flex:1;height:8px;background:#F0EEE8;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}

/* Chart legend */
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#666}
.legend-dot{width:8px;height:8px;border-radius:50%}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .bottom-nav{display:flex}
  .content{padding:14px;padding-bottom:80px}
  .grid-kpi{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🚗</div>
      <div>
        <div class="logo-text">DLMS</div>
        <div class="logo-sub">Driver License Mgmt</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="user-bar">
      <div class="user-avatar">S</div>
      <div>
        <div style="font-size:12px;font-weight:600;color:#333">SHE&En Officer</div>
        <div style="font-size:10px;color:#999">admin</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div style="font-size:16px;font-weight:700" id="page-title">หน้าหลัก</div>
      <div style="font-size:12px;color:#888" id="today-date"></div>
    </header>
    <div class="content" id="main-content">
      <div class="spinner-wrap"><div class="spinner"></div><span style="font-size:13px;color:#888">กำลังโหลด...</span></div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz7gqRkzLd6YhERW8VmOCuLEC-goCQaqgy6UB2oGfZFW_OWkIj3pAX9FTTgI2LpXwU/exec';

const NAV = [
  { id:'dashboard',      icon:'🏠', label:'หน้าหลัก' },
  { id:'employees',      icon:'👥', label:'พนักงาน' },
  { id:'reports',        icon:'📊', label:'รายงาน' },
  { id:'notifications',  icon:'🔔', label:'แจ้งเตือน' },
  { id:'settings',       icon:'⚙️', label:'ตั้งค่า' },
];

const STATUS = {
  normal:  { label:'ปกติ',     cls:'s-normal',  dot:'#639922' },
  '45d':   { label:'45 วัน',  cls:'s-45d',     dot:'#EF9F27' },
  '30d':   { label:'30 วัน',  cls:'s-30d',     dot:'#D05538' },
  '15d':   { label:'15 วัน',  cls:'s-15d',     dot:'#E24B4A' },
  expired: { label:'หมดอายุ', cls:'s-expired', dot:'#A32D2D' },
};

const CENTERS = ['ศูนย์วิจัยไร่สาม','ศูนย์ปรับปรุงพันธุ์สัตว์น้ำหาดเจ้า','ศูนย์วิจัยหาดเจ้า','ศูนย์วิจัยหัวกุญแจ','ศูนย์วิจัยเพชรบุรี'];
const CENTER_SHORT = {'ศูนย์วิจัยไร่สาม':'ไร่สาม','ศูนย์ปรับปรุงพันธุ์สัตว์น้ำหาดเจ้า':'ปรับปรุงพันธุ์ฯ','ศูนย์วิจัยหาดเจ้า':'หาดเจ้า','ศูนย์วิจัยหัวกุญแจ':'หัวกุญแจ','ศูนย์วิจัยเพชรบุรี':'เพชรบุรี'};

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentPage = 'dashboard';
let employees = [], empDetail = null;

// ─── UTILS ───────────────────────────────────────────────────────────────────
function daysRemaining(d) {
  if (!d) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const exp = new Date(d); exp.setHours(0,0,0,0);
  return Math.floor((exp - now) / 86400000);
}
function getStatus(days) {
  if (days===null) return 'normal';
  if (days<0) return 'expired';
  if (days<=15) return '15d';
  if (days<=30) return '30d';
  if (days<=45) return '45d';
  return 'normal';
}
function fmtDate(iso) {
  if (!iso) return '-';
  try {
    return new Date(iso).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
  } catch { return iso; }
}
function badge(status, days, sm) {
  const s = STATUS[status] || STATUS.normal;
  const label = days!==undefined && days!==null
    ? (days<0 ? `เกิน ${Math.abs(days)} วัน` : days===0 ? 'วันนี้!' : `${days} วัน`)
    : s.label;
  return `<span class="badge ${s.cls}${sm?' badge-sm':''}"><span class="badge-dot"></span>${label}</span>`;
}
function spinner(text='กำลังโหลด...') {
  return `<div class="spinner-wrap"><div class="spinner"></div><span style="font-size:13px;color:#888">${text}</span></div>`;
}

// ─── API ──────────────────────────────────────────────────────────────────────
async function api(action, params={}) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  url.searchParams.set('params', JSON.stringify(params));
  const res = await fetch(url.toString(), {redirect:'follow'});
  const json = await res.json();
  if (!json.ok) throw new Error(json.message || 'API error');
  return json.data;
}

// ─── RENDER NAV ───────────────────────────────────────────────────────────────
function renderNav() {
  const sidebarNav = document.getElementById('sidebar-nav');
  const bottomNav  = document.getElementById('bottom-nav');
  sidebarNav.innerHTML = NAV.map(n => `
    <button class="nav-item ${currentPage===n.id?'active':''}" onclick="navigate('${n.id}')">
      <span class="nav-icon">${n.icon}</span>${n.label}
    </button>`).join('');
  bottomNav.innerHTML = NAV.map(n => `
    <button class="bnav-item ${currentPage===n.id?'active':''}" onclick="navigate('${n.id}')">
      <span class="bnav-icon">${n.icon}</span>${n.label}
    </button>`).join('');
  const titles = {dashboard:'หน้าหลัก',employees:'รายชื่อพนักงาน',reports:'รายงาน',notifications:'การแจ้งเตือน',settings:'ตั้งค่า'};
  document.getElementById('page-title').textContent = titles[currentPage] || 'DLMS';
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
}

function navigate(page, data=null) {
  currentPage = page;
  empDetail = data;
  renderNav();
  renderPage();
}

// ─── PAGES ────────────────────────────────────────────────────────────────────
function renderPage() {
  const el = document.getElementById('main-content');
  if (currentPage==='dashboard')     renderDashboard(el);
  else if (currentPage==='employees' && !empDetail) renderEmployees(el);
  else if (currentPage==='employees' && empDetail)  renderEmployeeDetail(el, empDetail);
  else if (currentPage==='reports')  renderReports(el);
  else if (currentPage==='notifications') renderNotifications(el);
  else if (currentPage==='settings') renderSettings(el);
}

// ── Dashboard ──
async function renderDashboard(el) {
  el.innerHTML = spinner('กำลังโหลด Dashboard...');
  try {
    const [sum, centers] = await Promise.all([api('dashboard.summary'), api('dashboard.centerStats')]);
    el.innerHTML = dashboardHTML(sum, centers);
  } catch(e) {
    el.innerHTML = `<p style="color:red;padding:20px">❌ ${e.message}</p>`;
  }
}

function dashboardHTML(s, centers) {
  const total = Object.values(s.license_status).reduce((a,b)=>a+b,0)||1;
  const pct = (v) => Math.round(v/total*100);

  const alertsHTML = (s.recent_alerts||[]).slice(0,6).map(a => {
    const st = STATUS[a.status]||STATUS.normal;
    return `<div class="alert-row s-${a.status}" style="background:${getStatusBg(a.status)};border-color:${getStatusBorder(a.status)}">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:18px">${a.type==='license'?'🪪':'🎓'}</span>
        <div>
          <div style="font-size:13px;font-weight:600">${a.employee_name}</div>
          <div style="font-size:11px;color:#666">${a.research_center} · ${a.license_type||a.course_name||''}</div>
        </div>
      </div>
      ${badge(a.status, a.days_remaining, true)}
    </div>`;
  }).join('') || '<p style="text-align:center;color:#aaa;padding:20px;font-size:13px">ไม่มีรายการแจ้งเตือน 🎉</p>';

  const centerBars = centers.map(c => {
    const tot = c.total || 1;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="color:#555;font-weight:500">${CENTER_SHORT[c.center]||c.center}</span>
        <span style="color:#888">${c.total} คน</span>
      </div>
      <div style="display:flex;gap:2px;height:8px;border-radius:4px;overflow:hidden">
        <div style="width:${pct(c.normal)}%;background:#639922"></div>
        <div style="width:${pct(c.near_expiry)}%;background:#EF9F27"></div>
        <div style="width:${pct(c.expired)}%;background:#E24B4A"></div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="grid-kpi">
    <div class="kpi-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="kpi-label">พนักงานทั้งหมด</div>
          <div class="kpi-num" style="color:#185FA5">${s.total_employees}</div>
          <div class="kpi-sub">5 ศูนย์วิจัย</div>
        </div>
        <div class="kpi-icon" style="background:#185FA520;color:#185FA5">👥</div>
      </div>
    </div>
    <div class="kpi-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="kpi-label">ใกล้หมดอายุ</div>
          <div class="kpi-num" style="color:#BA7517">${s.near_expiry}</div>
          <div class="kpi-sub">ภายใน 45 วัน</div>
        </div>
        <div class="kpi-icon" style="background:#BA751720;color:#BA7517">⚠️</div>
      </div>
    </div>
    <div class="kpi-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="kpi-label">หมดอายุแล้ว</div>
          <div class="kpi-num" style="color:#E24B4A">${s.expired}</div>
          <div class="kpi-sub">ด่วน!</div>
        </div>
        <div class="kpi-icon" style="background:#E24B4A20;color:#E24B4A">🚨</div>
      </div>
    </div>
    <div class="kpi-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="kpi-label">Compliance</div>
          <div class="kpi-num" style="color:#3B6D11">${s.compliance_rate}%</div>
          <div class="kpi-sub">ปกติ</div>
        </div>
        <div class="kpi-icon" style="background:#3B6D1120;color:#3B6D11">✅</div>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">
    <div class="card" style="padding:18px">
      <div style="font-size:13px;font-weight:600;color:#333;margin-bottom:14px">📊 สถานะตามศูนย์วิจัย</div>
      ${centerBars}
      <div class="legend" style="margin-top:12px">
        <div class="legend-item"><div class="legend-dot" style="background:#639922"></div>ปกติ</div>
        <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>ใกล้หมด</div>
        <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div>หมดแล้ว</div>
      </div>
    </div>
    <div class="card" style="padding:18px">
      <div style="font-size:13px;font-weight:600;color:#333;margin-bottom:14px">🪪 สัดส่วนสถานะ</div>
      ${pieChartHTML(s.license_status)}
    </div>
  </div>

  <div class="card" style="padding:18px">
    <div style="font-size:13px;font-weight:600;color:#333;margin-bottom:12px">🔔 รายการแจ้งเตือนล่าสุด</div>
    ${alertsHTML}
  </div>`;
}

function pieChartHTML(ls) {
  const items = [
    {label:'ปกติ',    val:ls.normal||0,  color:'#639922'},
    {label:'45 วัน', val:ls['45d']||0,  color:'#EF9F27'},
    {label:'30 วัน', val:ls['30d']||0,  color:'#D05538'},
    {label:'15 วัน', val:ls['15d']||0,  color:'#E24B4A'},
    {label:'หมดอายุ',val:ls.expired||0, color:'#A32D2D'},
  ].filter(i=>i.val>0);
  const total = items.reduce((a,b)=>a+b.val,0)||1;
  let angle = -90, paths = '';
  items.forEach(item => {
    const pct = item.val/total;
    const deg = pct*360;
    const r = 60, cx = 80, cy = 80;
    const x1 = cx+r*Math.cos(angle*Math.PI/180);
    const y1 = cy+r*Math.sin(angle*Math.PI/180);
    angle += deg;
    const x2 = cx+r*Math.cos(angle*Math.PI/180);
    const y2 = cy+r*Math.sin(angle*Math.PI/180);
    const large = deg>180?1:0;
    paths += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${item.color}" opacity=".9"/>`;
  });
  const legend = items.map(i=>`<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div>${i.label}: ${i.val}</div>`).join('');
  return `<svg viewBox="0 0 160 160" style="width:100%;max-width:160px;display:block;margin:0 auto">
    <circle cx="80" cy="80" r="35" fill="#F5F4F0"/>

function getStatusBg(s) { return {normal:'#EAF3DE','45d':'#FAEEDA','30d':'#FEF0E6','15d':'#FCEBEB',expired:'#F7C1C1'}[s]||'#fff'; }
function getStatusBorder(s) { return {normal:'#639922','45d':'#BA7517','30d':'#D05538','15d':'#E24B4A',expired:'#A32D2D'}[s]||'#E8E6E0'; }

async function renderEmployees(el) {

  try {
    employees = await api('employees.list', {pageSize:100});

  } catch(e) {

function employeesHTML(emps) {
  const statuses = ['','normal','45d','30d','15d','expired'];
  const labels   = ['ทั้งหมด','ปกติ','45 วัน','30 วัน','15 วัน','หมดอายุ'];
  const pills = statuses.map((s,i)=>`
    <button class="filter-pill" id="pill-${s||'all'}" onclick="filterEmps('${s}')">${labels[i]}</button>`).join('');

  const rows = emps.map(e => {
    const corp = e.licenses?.corporate;
    const govt = e.licenses?.government;
    return `<div class="emp-row" onclick="openEmployee('${e.employee_id}')">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="emp-avatar">${e.full_name.charAt(2)||'?'}</div>
        <div>
          <div style="font-size:14px;font-weight:600">${e.full_name}</div>
          <div style="font-size:11px;color:#888;margin-top:1px">${e.employee_id} · ${CENTER_SHORT[e.research_center]||e.research_center}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${corp?`<div style="text-align:center"><div style="font-size:10px;color:#aaa;margin-bottom:2px">เครือฯ</div>${badge(corp.expiry_status,corp.days_remaining,true)}</div>`:''}
        ${govt?`<div style="text-align:center"><div style="font-size:10px;color:#aaa;margin-bottom:2px">ราชการ</div>${badge(govt.expiry_status,govt.days_remaining,true)}</div>`:''}
        <span style="font-size:16px;color:#ccc">›</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="card" style="padding:14px;margin-bottom:14px">
    <div class="search-wrap" style="margin-bottom:10px">
      <span class="icon">🔍</span>
      <input class="search-input" id="emp-search" placeholder="ค้นหาชื่อ, รหัส..." oninput="filterEmps()">
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <select class="filter-select" id="center-filter" onchange="filterEmps()" style="flex:1;min-width:140px">
        <option value="">ทุกศูนย์วิจัย</option>
        ${CENTERS.map(c=>`<option>${c}</option>`).join('')}
      </select>
      <div style="display:flex;gap:5px;flex-wrap:wrap">${pills}</div>
    </div>
  </div>
  <div style="font-size:12px;color:#888;margin-bottom:10px;padding-left:2px" id="emp-count">พบ ${emps.length} คน</div>
  <div id="emp-list">${rows}</div>`;
}

let activeStatus = '';
function filterEmps(status) {
  if (status !== undefined) {
    activeStatus = status;
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    document.getElementById(`pill-${status||'all'}`)?.classList.add('active');
  }
  const q = (document.getElementById('emp-search')?.value||'').toLowerCase();
  const center = document.getElementById('center-filter')?.value||'';
  const filtered = employees.filter(e => {
    const matchQ = !q || e.full_name.toLowerCase().includes(q) || e.employee_id.toLowerCase().includes(q);
    const matchC = !center || e.research_center === center;
    const matchS = !activeStatus || e.overall_status === activeStatus;
    return matchQ && matchC && matchS;
  });
  const listEl = document.getElementById('emp-list');
  const countEl = document.getElementById('emp-count');
  if (listEl) listEl.innerHTML = filtered.map(e => {
    const corp = e.licenses?.corporate;
    const govt = e.licenses?.government;
    return `<div class="emp-row" onclick="openEmployee('${e.employee_id}')">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="emp-avatar">${e.full_name.charAt(2)||'?'}</div>
        <div>
          <div style="font-size:14px;font-weight:600">${e.full_name}</div>
          <div style="font-size:11px;color:#888">${e.employee_id} · ${CENTER_SHORT[e.research_center]||e.research_center}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${corp?`<div style="text-align:center"><div style="font-size:10px;color:#aaa;margin-bottom:2px">เครือฯ</div>${badge(corp.expiry_status,corp.days_remaining,true)}</div>`:''}
        ${govt?`<div style="text-align:center"><div style="font-size:10px;color:#aaa;margin-bottom:2px">ราชการ</div>${badge(govt.expiry_status,govt.days_remaining,true)}</div>`:''}
        <span style="color:#ccc">›</span>
      </div>
    </div>`;
  }).join('') || '<p style="text-align:center;color:#aaa;padding:30px;font-size:13px">ไม่พบรายชื่อ</p>';
  if (countEl) countEl.textContent = `พบ ${filtered.length} จาก ${employees.length} คน`;
}

async function openEmployee(id) {
  const el = document.getElementById('main-content');
  el.innerHTML = spinner();
  try {
    const [emp, licenses, trainings] = await Promise.all([
      api('employees.get', {employee_id:id}),
      api('licenses.getByEmployee', {employee_id:id}),
      api('trainings.getByEmployee', {employee_id:id}),
    ]);
    empDetail = {emp, licenses, trainings};
    currentPage = 'employees';
    renderNav();
    el.innerHTML = empDetailHTML(emp, licenses, trainings);
  } catch(e) {
    el.innerHTML = `<p style="color:red;padding:20px">❌ ${e.message}</p>`;
  }
}

function renderEmployeeDetail(el, d) {

function switchTab(t) {
  document.getElementById('tab-lic').classList.toggle('active', t==='lic');

}

          .map(([k,l,d])=>`<button onclick="loadReport('${k}')" style="padding:10px 14px;border:1px solid #E8E6E0;border-radius:8px;background:#fff;cursor:pointer;text-align:left;flex:1;min-width:140px;font-family:Sarabun,sans-serif">

  </div>`;

async function loadReport(type) {
  const el = document.getElementById('report-result');
  el.innerHTML = spinner('กำลังสร้างรายงาน...');
  try {
    const actions = {license:'reports.licenseExpiry', training:'reports.trainingDue', full:'reports.fullExport'};
    const res = await api(actions[type]);
    const data = res.data || [];
    if (!data.length) { el.innerHTML = '<p style="text-align:center;color:#aaa;padding:30px">ไม่มีรายการ 🎉</p>'; return; }
    const headers = Object.keys(data[0]).slice(0,7);
    el.innerHTML = `<div class="card" style="padding:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;font-weight:600">พบ ${data.length} รายการ</div>
        <button onclick="downloadCSV()" style="padding:7px 14px;background:#1565C0;color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-family:Sarabun,sans-serif">⬇️ CSV</button>
      </div>
      <div style="overflow-x:auto">
        <table class="report-table">
          <thead><tr>${headers.map(h=>`<th>${h.replace(/_/g,' ')}</th>`).join('')}</tr></thead>
          <tbody>${data.slice(0,30).map(row=>`<tr>${headers.map(h=>`<td>${row[h]??'-'}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
        ${data.length>30?`<p style="text-align:center;font-size:11px;color:#aaa;padding:8px">แสดง 30 จาก ${data.length} — กด CSV เพื่อดูทั้งหมด</p>`:''}
      </div>
    </div>`;
    window._reportData = data;
  } catch(e) { el.innerHTML = `<p style="color:red">❌ ${e.message}</p>`; }
}

function downloadCSV() {
  const data = window._reportData;
  if (!data?.length) return;
  const headers = Object.keys(data[0]);
  const rows = data.map(r=>headers.map(h=>`"${r[h]??''}"`).join(','));
  const csv = [headers.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = `DLMS_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
