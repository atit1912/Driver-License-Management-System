<!DOCTYPE html>
<html lang="th">
<head>

<!-- Firebase SDK v10 (ESM via CDN) -->
<script type="module">

import { getFirestore, collection, doc, getDoc, getDocs, query, where, orderBy, updateDoc, addDoc, setDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check.js';

// ─── Firebase Config ────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyAqj93fq-QwU1L0DZUlfDK_mUq9YozB9Uc",
  authDomain: "dlms-3b46c.firebaseapp.com",
  projectId: "dlms-3b46c",
  storageBucket: "dlms-3b46c.firebasestorage.app",
  messagingSenderId: "427087001104",
  appId: "1:427087001104:web:4c683a3257c2759e5e3c95"
};
const app = initializeApp(firebaseConfig);

// ── App Check (reCAPTCHA v3) ────────────────────────────────
// วาง Site Key ที่ได้จาก Firebase Console > App Check ตรงนี้
// ถ้ายังเป็นค่า placeholder ระบบจะข้ามไป (ไม่พัง) — แต่อย่าลืมกลับมาใส่!
const RECAPTCHA_SITE_KEY = 'PASTE_YOUR_RECAPTCHA_SITE_KEY_HERE';
if (RECAPTCHA_SITE_KEY && !RECAPTCHA_SITE_KEY.startsWith('PASTE_')) {
  try {
    initializeAppCheck(app, {
      provider: new ReCaptchaV3Provider(RECAPTCHA_SITE_KEY),
      isTokenAutoRefreshEnabled: true
    });
  } catch (e) { console.warn('AppCheck:', e); }
}

const db  = getFirestore(app);

window._db = db;
window._fbModules = { collection, doc, getDoc, getDocs, query, where, orderBy, updateDoc, addDoc, setDoc, Timestamp };

// ─── Boot ────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => { renderNav(); renderPage(); setTimeout(preloadData, 400); });
</script>

<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100vw}
body{font-family:'Sarabun',sans-serif;background:#F0F2F5;color:#1a1a1a;font-size:14px;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:'Sarabun',sans-serif}

/* ── Dark mode — ตัวแปรสี ── */
body.dark{background:#0F172A;color:#E2E8F0}
body.dark .card,body.dark .kpi{background:#1E293B;border-color:#334155}
body.dark .emp-row{background:#1E293B;border-color:#334155;color:#E2E8F0}
body.dark .topbar{background:#1E293B;border-color:#334155;color:#E2E8F0}
body.dark .sinput{background:#0F172A;border-color:#334155;color:#E2E8F0}
body.dark .sinput::placeholder{color:#475569}
body.dark .fsel{background:#1E293B;border-color:#334155;color:#E2E8F0}
body.dark .fpill{background:#1E293B;border-color:#334155;color:#94A3B8}
body.dark .fpill.active{background:#3B82F6;border-color:#3B82F6;color:#fff}
body.dark .tabs{background:#0F172A}
body.dark .tab-btn{background:transparent;color:#64748B}
body.dark .tab-btn.active{background:#1E293B;color:#60A5FA}
body.dark .kpi-label{color:#94A3B8}
body.dark .kpi-val{color:#F1F5F9}
body.dark .kpi-sub{color:#64748B}
body.dark .stitle{color:#CBD5E1}
body.dark .ilabel{color:#64748B}
body.dark .ival{color:#CBD5E1}
body.dark .ival.hl{color:#F87171}
body.dark .cbar-track{background:#334155}
body.dark .cbar-label{color:#94A3B8}
body.dark .cbar-num{color:#64748B}
body.dark .dl-item{color:#CBD5E1}
body.dark .rtable th{background:#0F172A;color:#94A3B8;border-color:#334155}
body.dark .rtable td{border-color:#1E293B;color:#CBD5E1}
body.dark .rtable tr:hover td{background:#334155}
body.dark .btn-ghost{background:#1E293B;color:#CBD5E1;border-color:#334155}
body.dark .btn-ghost:hover{background:#334155}
body.dark .back-btn{color:#60A5FA}
body.dark .photo-box{background:#0F172A;border-color:#334155}
body.dark .photo-box .ph-label{color:#94A3B8}
.alert-row,.alert-row *{color:#1a1a1a}
.page-title-text{color:#111827}
body.dark .page-title-text{color:#F1F5F9}
.ham-icon{color:#6B7280}
body.dark .ham-icon{color:#94A3B8}
.today-label-text{color:#9CA3AF}
body.dark .today-label-text{color:#64748B}
.report-count-text{color:#374151}
body.dark .report-count-text{color:#CBD5E1}
.legend-text{color:#6B7280}
body.dark .legend-text{color:#94A3B8}
.donut-center{fill:#fff}
body.dark .donut-center{fill:#1E293B}
.donut-num{fill:#111}
body.dark .donut-num{fill:#F1F5F9}
.rep-btn{padding:12px 16px;border:1px solid #E8ECF0;border-radius:10px;background:#fff;cursor:pointer;text-align:left;flex:1;min-width:140px;font-family:'Sarabun',sans-serif;transition:all .15s}
.rep-btn:hover{border-color:#3B82F6}
.rep-btn .rb-title{font-size:13px;font-weight:600;color:#111}
body.dark .rep-btn{background:#1E293B;border-color:#334155}
body.dark .rep-btn .rb-title{color:#E2E8F0}
.sort-active{background:#1D4ED8!important;color:#fff!important;border-color:#1D4ED8!important}

/* ── Layout ── */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1a2942;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;transition:transform .3s}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;-webkit-tap-highlight-color:transparent}
.overlay.show{display:block}
.main{flex:1;margin-left:220px;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #E8ECF0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.content{flex:1;padding:20px;padding-bottom:80px;max-width:1100px;min-width:0;overflow-x:hidden}

/* ── Sidebar ── */
.logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-text{font-weight:700;font-size:15px;color:#fff;line-height:1.1}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4)}
nav.snav{flex:1;padding:12px 8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:2px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:rgba(59,130,246,.25);color:#93C5FD}
.ni-icon{font-size:17px;width:20px;text-align:center}
.ubar{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:8px}
.uavatar{width:32px;height:32px;border-radius:50%;background:rgba(59,130,246,.3);color:#93C5FD;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}

/* ── Bottom nav mobile ── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1a2942;border-top:1px solid rgba(255,255,255,.1);justify-content:space-around;padding:6px 0 max(8px,env(safe-area-inset-bottom));z-index:40}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:500;color:rgba(255,255,255,.5);border:none;background:none;padding:4px 6px;cursor:pointer;transition:color .15s;font-family:'Sarabun',sans-serif;min-width:52px}
.bni.active{color:#93C5FD}
.bni-icon{font-size:20px}

/* ── Cards ── */
.card{background:#fff;border-radius:14px;border:1px solid #E8ECF0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-p{padding:16px}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.kpi{background:#fff;border-radius:14px;border:1px solid #E8ECF0;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start}
.kpi-label{font-size:11px;color:#8896A0;font-weight:500;letter-spacing:.03em;margin-bottom:6px}
.kpi-val{font-size:28px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:#B0BDC8;margin-top:4px}
.kpi-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;border:1px solid;max-width:100%}
.badge-sm{padding:2px 7px;font-size:11px}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sn{color:#166534;background:#DCFCE7;border-color:#86EFAC}.sn .bdot{background:#16A34A}
.s45{color:#92400E;background:#FEF3C7;border-color:#FCD34D}.s45 .bdot{background:#D97706}
.s30{color:#9A3412;background:#FEE2E2;border-color:#FCA5A5}.s30 .bdot{background:#DC2626}
.s15{color:#7F1D1D;background:#FECACA;border-color:#F87171}.s15 .bdot{background:#EF4444}
.sx{color:#fff;background:#991B1B;border-color:#7F1D1D}.sx .bdot{background:#fff}

/* ── Alert row ── */
.alert-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;border:1px solid;flex-wrap:wrap;gap:8px;margin-bottom:6px}

/* ── Employee rows ── */
.emp-row{background:#fff;border-radius:12px;border:1px solid #E8ECF0;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;transition:all .15s;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.03);min-width:0}
.emp-row:active{opacity:.85}
.eavatar{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#DBEAFE,#BFDBFE);color:#1D4ED8;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}

/* ── Tabs ── */
.tabs{display:flex;background:#F0F2F5;border-radius:10px;padding:3px;margin-bottom:14px;gap:3px}
.tab-btn{flex:1;padding:9px 4px;border:none;cursor:pointer;font-size:12.5px;font-weight:500;background:transparent;color:#6B7280;transition:all .2s;border-radius:8px;font-family:'Sarabun',sans-serif;white-space:nowrap}
.tab-btn.active{background:#fff;color:#1D4ED8;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ── Form ── */
.sw{position:relative}
.sw .sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:15px;pointer-events:none}
.sinput{width:100%;padding:10px 12px 10px 34px;border:1px solid #E8ECF0;border-radius:10px;font-size:14px;outline:none;background:#FAFBFC;transition:border-color .15s;font-family:'Sarabun',sans-serif;-webkit-appearance:none}
.sinput:focus{border-color:#3B82F6;background:#fff}
.fsel{padding:9px 12px;border:1px solid #E8ECF0;border-radius:10px;font-size:13px;background:#FAFBFC;color:#374151;outline:none;font-family:'Sarabun',sans-serif;cursor:pointer;width:100%;-webkit-appearance:none}
.fpill{padding:7px 14px;border:1px solid #E8ECF0;border-radius:20px;font-size:12px;background:#fff;color:#6B7280;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s;font-weight:500;white-space:nowrap}
.fpill.active{background:#1D4ED8;color:#fff;border-color:#1D4ED8}

/* ── Info grid ── */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ilabel{font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.ival{font-size:13px;color:#374151;word-break:break-word}
.ival.hl{color:#DC2626;font-weight:600}

/* ── Spinner ── */
.sw-center{display:flex;flex-direction:column;align-items:center;padding:50px;gap:14px}
.spin{width:34px;height:34px;border-radius:50%;border:3px solid #E8ECF0;border-top-color:#3B82F6;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Section title ── */
.stitle{font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:6px}

/* ── Table — scroll on mobile ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid #E8ECF0}
.rtable{width:100%;border-collapse:collapse;font-size:12.5px;min-width:420px}
.rtable th{padding:9px 12px;text-align:left;font-weight:600;color:#6B7280;border-bottom:2px solid #E8ECF0;background:#F8FAFC;white-space:nowrap}
.rtable td{padding:9px 12px;border-bottom:1px solid #F0F2F5;color:#374151;white-space:nowrap}
.rtable tr:hover td{background:#F8FAFC}

/* ── Chart bars ── */
.cbar-wrap{display:flex;flex-direction:column;gap:10px}
.cbar-row{display:flex;align-items:center;gap:8px}
.cbar-label{font-size:11px;color:#6B7280;min-width:70px;max-width:70px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbar-track{flex:1;height:10px;background:#F0F2F5;border-radius:5px;overflow:hidden;display:flex;gap:2px;min-width:0}
.cbar-seg{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.cbar-num{font-size:11px;color:#9CA3AF;min-width:22px;text-align:right;flex-shrink:0}

/* ── Donut ── */
.donut-wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:100px}
.dl-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#374151}
.dl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── Buttons ── */
.btn-primary{padding:9px 16px;background:#1D4ED8;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;transition:background .15s;display:inline-flex;align-items:center;gap:5px;touch-action:manipulation}
.btn-primary:hover{background:#1E40AF}
.btn-ghost{padding:8px 14px;background:#fff;color:#374151;border:1px solid #E8ECF0;border-radius:8px;font-size:12.5px;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s;touch-action:manipulation}
.btn-ghost:hover{background:#F0F2F5}
.back-btn{background:none;border:none;color:#3B82F6;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:0;margin-bottom:14px;font-family:'Sarabun',sans-serif;font-weight:500;touch-action:manipulation}

/* ── Photo upload ── */
.photo-box{width:100%;aspect-ratio:16/9;border:2px dashed #BFDBFE;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;background:#F8FAFF;position:relative;overflow:hidden}
.photo-box img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0}
.photo-box .ph-label{font-size:12px;color:#6B7280;text-align:center;z-index:1;padding:0 12px}

/* ── Responsive ── */
@media(min-width:769px){
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .bnav{display:flex}
  .content{padding:12px;padding-bottom:calc(70px + env(safe-area-inset-bottom))}
  .card-p{padding:14px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .kpi-val{font-size:24px}
  .donut-wrap{flex-direction:column;align-items:flex-start}
  .chart-grid{grid-template-columns:1fr!important}
  .ig{grid-template-columns:1fr 1fr}
  .emp-row{flex-wrap:nowrap}
  .fpill{padding:6px 10px;font-size:11px}
  #ham-btn{display:block!important}
  .stitle{font-size:12.5px}
}
@media(max-width:360px){
  .kpi-val{font-size:20px}
  .badge{font-size:11px;padding:2px 7px}
  .fpill{font-size:10px;padding:5px 8px}
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-icon">🚗</div>
    <div><div class="logo-text">DLMS</div><div class="logo-sub">Driver License Mgmt</div></div>
  </div>
  <nav class="snav" id="snav"></nav>
  <div class="ubar">
    <div class="uavatar">S</div>
    <div><div style="font-size:12px;font-weight:600;color:#fff">SHE&En Officer</div><div style="font-size:10px;color:rgba(255,255,255,.4)">admin</div></div>
  </div>
</aside>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="toggleSidebar()" style="border:none;background:none;font-size:22px;cursor:pointer;padding:0;line-height:1;display:none" class="ham-icon" id="ham-btn">☰</button>
      <div id="page-title" class="page-title-text" style="font-size:17px;font-weight:700"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:12px" class="today-label-text" id="today-label"></div>
      <button onclick="toggleDark()" id="dark-btn" style="border:none;background:none;font-size:20px;cursor:pointer;line-height:1;padding:0" title="Dark mode">🌙</button>
    </div>
  </header>
  <div class="content" id="content">
    <div class="sw-center"><div class="spin"></div><span style="font-size:13px;color:#9CA3AF">กำลังโหลด...</span></div>
  </div>
</div>
<nav class="bnav" id="bnav"></nav>
</div>

<script>
// ─── CONFIG ─────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',icon:'🏠',label:'หน้าหลัก'},
  {id:'employees',icon:'👥',label:'พนักงาน'},
  {id:'trainings',icon:'🎓',label:'การอบรม'},
  {id:'reports',  icon:'📊',label:'รายงาน'},
  {id:'settings', icon:'⚙️',label:'ตั้งค่า'},
  {id:'executive',icon:'📈',label:'ภาพรวมผู้บริหาร'},
];
const TITLES={dashboard:'หน้าหลัก',employees:'รายชื่อพนักงาน',trainings:'การอบรมทั้งองค์กร',reports:'รายงาน',settings:'ตั้งค่า',executive:'ภาพรวมผู้บริหาร'};
const CENTERS=['ศูนย์วิจัยไร่สาม','ศูนย์ปรับปรุงพันธุ์สัตว์น้ำหาดเจ้า','ศูนย์วิจัยหาดเจ้า','ศูนย์วิจัยหัวกุญแจ','ศูนย์วิจัยเพชรบุรี'];
const CS={'ศูนย์วิจัยไร่สาม':'ไร่สาม','ศูนย์ปรับปรุงพันธุ์สัตว์น้ำหาดเจ้า':'ปรับปรุงฯ','ศูนย์วิจัยหาดเจ้า':'หาดเจ้า','ศูนย์วิจัยหัวกุญแจ':'หัวกุญแจ','ศูนย์วิจัยเพชรบุรี':'เพชรบุรี'};
const SC={

// ─── UTILS ───────────────────────────────────────────────────
const daysUntil=d=>{if(!d)return null;const n=new Date();n.setHours(0,0,0,0);const e=new Date(d);e.setHours(0,0,0,0);return Math.floor((e-n)/86400000)};
const calcStatus=d=>{if(d===null)return 'normal';if(d<0)return 'expired';if(d<=15)return '15d';if(d<=30)return '30d';if(d<=45)return '45d';return 'normal'};
const fdate=d=>{
  if(!d||d==='-'||d==='undefined'||d==='')return '-';
  try{
    if(d&&d.toDate) d=d.toDate();
    if(d instanceof Date){const dd=d.getDate(),mm=d.getMonth()+1,yy=d.getFullYear()+543;return`${String(dd).padStart(2,'0')}/${String(mm).padStart(2,'0')}/${yy}`;}
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){const[dd,mm,yy]=d.split('/').map(Number);return`${String(dd).padStart(2,'0')}/${String(mm).padStart(2,'0')}/${yy+543}`;}
    if(/^\d{4}-\d{2}-\d{2}/.test(d)){const[yy,mm,dd]=d.substring(0,10).split('-').map(Number);return`${String(dd).padStart(2,'0')}/${String(mm).padStart(2,'0')}/${yy+543}`;}
    return d;
  }catch{return d}
};
const toDate=v=>{
  if(!v)return null;
  if(v&&v.toDate) return v.toDate();
  if(v instanceof Date) return v;
  if(typeof v==='string'){
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(v)){const[d,m,y]=v.split('/').map(Number);return new Date(y,m-1,d);}
    if(/^\d{4}-\d{2}-\d{2}/.test(v)) return new Date(v.substring(0,10));
  }
  return null;
};
// แปลง Date → 'YYYY-MM-DD' ตามเวลาท้องถิ่น (แก้บั๊ก timezone ที่ทำให้วันเลื่อนถอย 1 วัน)
const toLocalISO=d=>{if(!(d instanceof Date)||isNaN(d))return '';return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`};
// ดึงอักษรแรกของชื่อจริง (ตัดคำนำหน้า นาย/นาง/นางสาว/น.ส. ออกก่อน)

const badge=(s,d,sm)=>{const c=SC[s]||SC.normal;const lbl=d!=null?(d<0?`เกิน ${Math.abs(d)} วัน`:d===0?'วันนี้!':`${d} วัน`):c.label;return`<span class="badge ${c.cls}${sm?' badge-sm':''}"><span class="bdot"></span>${lbl}</span>`};

const kpi=(label,val,sub,color,bg,icon)=>`<div class="kpi"><div class="kpi-top"><div><div class="kpi-label">${label}</div><div class="kpi-val" style="color:${color}">${val}</div><div class="kpi-sub">${sub}</div></div><div class="kpi-ico" style="background:${bg}">${icon}</div></div></div>`;

// ─── FIRESTORE API LAYER ────────────────────────────────────
// แทน function api() เดิม ใช้ Firestore SDK โดยตรง
async function fsGetAll(col) {
  const k='col:'+col;
  if(_cache[k]&&Date.now()-_cache[k].t<_TTL) return _cache[k].d;
  const {getDocs,collection}=fb();
  const snap=await getDocs(collection(getDB(),col));
  const d=snap.docs.map(doc=>({id:doc.id,...doc.data()}));
  _cache[k]={d,t:Date.now()};
  return d;
}
async function fsGet(col,id){
  const k=col+':'+id;
  if(_cache[k]&&Date.now()-_cache[k].t<_TTL) return _cache[k].d;
  const {getDoc,doc}=fb();
  const snap=await getDoc(doc(getDB(),col,id));
  if(!snap.exists()) return null;
  const d={id:snap.id,...snap.data()};
  _cache[k]={d,t:Date.now()};
  return d;
}
async function fsQuery(col,...constraints){
  const {getDocs,query,collection}=fb();
  const q=query(collection(getDB(),col),...constraints);
  const snap=await getDocs(q);
  return snap.docs.map(doc=>({id:doc.id,...doc.data()}));
}
async function fsUpdate(col,id,data){
  const {updateDoc,doc}=fb();
  await updateDoc(doc(getDB(),col,id),{...data,updated_at:new Date().toISOString()});
  // clear cache
  Object.keys(_cache).filter(k=>k.startsWith(col)).forEach(k=>delete _cache[k]);
}
async function fsSet(col,id,data){
  const {setDoc,doc}=fb();
  await setDoc(doc(getDB(),col,id),{...data,updated_at:new Date().toISOString()},{merge:true});
  Object.keys(_cache).filter(k=>k.startsWith(col)).forEach(k=>delete _cache[k]);
}

// ─── DATA HELPERS ────────────────────────────────────────────
function normalizeLic(l){
  const expDate=toDate(l.expiry_date);
  const d=expDate?daysUntil(expDate):null;
  return {...l, _expiryDate:expDate, days_remaining:d, expiry_status:calcStatus(d)};
}
function overallStatus(lics){
  const statOrder=['expired','15d','30d','45d','normal'];
  let worst='normal';
  lics.forEach(l=>{
    if(statOrder.indexOf(l.expiry_status)<statOrder.indexOf(worst)) worst=l.expiry_status;
  });
  return worst;
}

// ── DASHBOARD ──
function donut(ls){
  const items=[
    {label:'ปกติ',val:ls.normal||0,color:'#16A34A'},
    {label:'45 วัน',val:ls['45d']||0,color:'#D97706'},
    {label:'30 วัน',val:ls['30d']||0,color:'#DC2626'},
    {label:'15 วัน',val:ls['15d']||0,color:'#EF4444'},
    {label:'หมดอายุ',val:ls.expired||0,color:'#7F1D1D'},
  ].filter(i=>i.val>0);
  const total=items.reduce((a,b)=>a+b.val,0)||1;
  let ang=-90,paths='';
  items.forEach(item=>{
    const deg=item.val/total*360,r=55,cx=70,cy=70;
    if(deg>=359.99){ // สถานะเดียว 100% → วาดวงกลมเต็ม (arc 360° วาดไม่ออกเพราะจุดเริ่ม-จบทับกัน)
      paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${item.color}"/>`;
      ang+=deg;return;
    }
    const x1=cx+r*Math.cos(ang*Math.PI/180),y1=cy+r*Math.sin(ang*Math.PI/180);
    ang+=deg;
    const x2=cx+r*Math.cos(ang*Math.PI/180),y2=cy+r*Math.sin(ang*Math.PI/180);
    paths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${deg>180?1:0},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${item.color}"/>`;
  });
  return`<div class="donut-wrap">
    <svg viewBox="0 0 140 140" style="width:130px;flex-shrink:0">${paths}
      <circle cx="70" cy="70" r="32" class="donut-center"/>
      <text x="70" y="66" text-anchor="middle" font-size="16" font-weight="700" class="donut-num" font-family="Sarabun">${total}</text>
      <text x="70" y="80" text-anchor="middle" font-size="10" fill="#9CA3AF" font-family="Sarabun">ใบขับขี่</text>
    </svg>
    <div class="donut-legend">${items.map(i=>`<div class="dl-item"><div class="dl-dot" style="background:${i.color}"></div><span>${i.label}: <strong>${i.val}</strong></span></div>`).join('')}</div>
  </div>`;
}

  empList.forEach(e=>{const s=e.overall_status||'normal';counts[s]=(counts[s]||0)+1});
  counts['']=(empList.length);
  el.innerHTML=`
  <div class="card card-p" style="margin-bottom:12px">
    <div class="sw" style="margin-bottom:10px">
      <span class="sico">🔍</span>
      <input class="sinput" id="esearch" placeholder="ค้นหาชื่อ, รหัสพนักงาน..." oninput="filterEmp()">
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <select class="fsel" id="ecenter" onchange="filterEmp()" style="flex:1;min-width:140px">
        <option value="">ทุกศูนย์วิจัย</option>
        ${CENTERS.map(c=>`<option>${c}</option>`).join('')}
      </select>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${statFilters.map(([v,l])=>`<button class="fpill${activeStatus===v?' active':''}" id="ep-${v||'all'}" onclick="setEmpStatus('${v}')">${l}${counts[v]!==undefined?` <span style="opacity:.7">${counts[v]}</span>`:''}</button>`).join('')}

      </div>
    </div>
  </div>
  <div style="font-size:12px;color:#9CA3AF;margin-bottom:10px;padding-left:2px" id="ecount">พบ ${empList.length} คน</div>
  <div id="elist">${empRows(sortEmp(empList))}</div>`;
}
const empMinDays=e=>{const ds=[e.licenses?.corporate?.days_remaining,e.licenses?.government?.days_remaining].filter(v=>v!=null);return ds.length?Math.min(...ds):9999;};
const sortEmp=list=>empSort?[...list].sort((a,b)=>empMinDays(a)-empMinDays(b)):list;
function toggleEmpSort(){empSort=!empSort;document.getElementById('ep-sort')?.classList.toggle('sort-active',empSort);filterEmp();}
function empRows(list){
  return list.map(e=>{
    const corp=e.licenses?.corporate,govt=e.licenses?.government;
    return`<div class="emp-row" onclick="openEmp('${e.employee_id||e.id}')">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="eavatar">${avatarChar(e.full_name)}</div>
        <div>
          <div style="font-size:14px;font-weight:600">${e.full_name}</div>
          <div style="font-size:11.5px;color:#9CA3AF;margin-top:1px">${e.employee_id||e.id} · ${CS[e.research_center]||e.research_center}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        ${corp?`<div><div style="font-size:10px;color:#9CA3AF;text-align:center;margin-bottom:2px">เครือฯ</div>${badge(corp.expiry_status,corp.days_remaining,true)}</div>`:''}
        ${govt?`<div><div style="font-size:10px;color:#9CA3AF;text-align:center;margin-bottom:2px">ราชการ</div>${badge(govt.expiry_status,govt.days_remaining,true)}</div>`:''}
        <span style="color:#C7D2DA;font-size:18px">›</span>
      </div>
    </div>`;
  }).join('')||empty('ไม่พบรายชื่อที่ค้นหา');
}
function setEmpStatus(v){activeStatus=v;document.querySelectorAll('[id^="ep-"]').forEach(b=>b.classList.remove('active'));document.getElementById(`ep-${v||'all'}`)?.classList.add('active');filterEmp();}
function filterEmp(){
  const q=(document.getElementById('esearch')?.value||'').toLowerCase();
  const center=document.getElementById('ecenter')?.value||'';
  const f=empList.filter(e=>{
    const mq=!q||e.full_name.toLowerCase().includes(q)||(e.employee_id||e.id).toLowerCase().includes(q);
    const mc=!center||e.research_center===center;
    const ms=!activeStatus||e.overall_status===activeStatus;
    return mq&&mc&&ms;
  });
  document.getElementById('elist').innerHTML=empRows(sortEmp(f));
  document.getElementById('ecount').textContent=`พบ ${f.length} จาก ${empList.length} คน`;
}
async function openEmp(id){
  document.getElementById('content').innerHTML=spin();
  try{
    const {where}=fb();
    const[emp,lics,trns,hist]=await Promise.all([
      fsGet('employees',id),
      fsQuery('licenses',where('employee_id','==',id)),
      fsQuery('trainings',where('employee_id','==',id)),
      fsQuery('license_history',where('employee_id','==',id)).catch(()=>[]),
    ]);
    const normLics=lics.map(normalizeLic);
    hist.sort((a,b)=>(b.changed_at||'').localeCompare(a.changed_at||''));
    empCache._detail={emp:{...emp,employee_id:emp?.id||id},lics:normLics,trns,hist};
    renderNav();
    pgDetail(document.getElementById('content'),empCache._detail);
  }catch(e){document.getElementById('content').innerHTML=err(e.message);}
}

async function submitEditLicense(licId,empId){
  const licNo=document.getElementById('edit-licno').value.trim();
  const expiry=document.getElementById('edit-expiry').value;
  if(!expiry){alert('กรุณาเลือกวันหมดอายุ');return;}
  if(!licNo){alert('กรุณากรอกเลขที่ใบขับขี่');return;}
  try{
    // เก็บค่าเดิมไว้ก่อนบันทึก เพื่อลง log ประวัติการต่อ
    const old=(empCache._detail?.lics||[]).find(x=>x.id===licId)||{};
    const oldExpiry=old._expiryDate?toLocalISO(old._expiryDate):'';
    await fsUpdate('licenses',licId,{license_number:licNo,expiry_date:expiry});
    // บันทึกประวัติ (เฉพาะเมื่อค่าเปลี่ยนจริง) — ถ้าลง log ไม่สำเร็จ ไม่ต้อง block การบันทึกหลัก
    if(oldExpiry!==expiry||old.license_number!==licNo){
      try{
        const {addDoc,collection}=fb();
        await addDoc(collection(getDB(),'license_history'),{
          license_id:licId,employee_id:empId,license_type:old.license_type||'',
          old_expiry:oldExpiry,new_expiry:expiry,
          old_license_number:old.license_number||'',new_license_number:licNo,
          changed_at:new Date().toISOString()
        });
      }catch(e){console.warn('history:',e);}
    }
    document.getElementById('edit-modal').remove();
    alert('✅ บันทึกสำเร็จ');
    empList=[];preloadData(); // รีเฟรชรายชื่อ+badge ให้เป็นข้อมูลล่าสุด
    openEmp(empId);
  }catch(e){alert('❌ '+e.message);}
}

// ── LICENSE PHOTO (เก็บ base64 ใน Firestore — ไม่ต้องใช้ Storage) ──
function pickLicPhoto(licId,empId){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=async()=>{
    const file=inp.files[0];if(!file)return;
    if(!file.type.startsWith('image/')){alert('กรุณาเลือกไฟล์รูปภาพ');return;}
    try{
      const dataUrl=await compressImage(file);
      if(dataUrl.length>950000){alert('❌ รูปใหญ่เกินไปหลังบีบอัด กรุณาถ่าย/ครอปให้เล็กลง');return;}
      await fsUpdate('licenses',licId,{photo_data:dataUrl});
      const l=(empCache._detail?.lics||[]).find(x=>x.id===licId);
      if(l)l.photo_data=dataUrl;
      pgDetail(document.getElementById('content'),empCache._detail);
    }catch(e){alert('❌ บันทึกรูปไม่สำเร็จ: '+e.message);}
  };
  inp.click();
}
// บีบอัดรูปด้วย canvas: จำกัดด้านยาวสุด 900px, JPEG — ลด quality อัตโนมัติถ้ายังใหญ่
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const MAX=900;
      let{width:w,height:h}=img;
      if(Math.max(w,h)>MAX){const s=MAX/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.75,out=cv.toDataURL('image/jpeg',q);
      while(out.length>900000&&q>0.3){q-=0.1;out=cv.toDataURL('image/jpeg',q);}
      resolve(out);
    };
    img.onerror=()=>{URL.revokeObjectURL(url);reject(new Error('อ่านไฟล์รูปไม่สำเร็จ'));};
    img.src=url;
  });
}
function viewLicPhoto(licId){

  const src=l?.photo_data||l?.photo_url;if(!src)return;

function pickCertPhoto(trnId,empId){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=async()=>{
    const file=inp.files[0];if(!file)return;
    if(!file.type.startsWith('image/')){alert('กรุณาเลือกไฟล์รูปภาพ');return;}
    try{
      const dataUrl=await compressImage(file);
      if(dataUrl.length>950000){alert('❌ รูปใหญ่เกินไปหลังบีบอัด กรุณาถ่าย/ครอปให้เล็กลง');return;}

      const t=(empCache._detail?.trns||[]).find(x=>x.id===trnId);
      if(t)t.cert_data=dataUrl;
      pgDetail(document.getElementById('content'),empCache._detail);
    }catch(e){alert('❌ บันทึกใบ Cer ไม่สำเร็จ: '+e.message);}
  };
  inp.click();
}

function dlCSV(){
  if(!reportData?.length)return;
  const h=Object.keys(reportData[0]);
  const rows=reportData.map(r=>h.map(k=>`"${r[k]??''}"`).join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`DLMS_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

let trnTab='pending', trnData=null;
async function pgTrainings(el){
  el.innerHTML=spin('กำลังโหลดข้อมูลการอบรม...');
  try{
    const[allEmps,allTrns,allLics]=await Promise.all([fsGetAll('employees'),fsGetAll('trainings'),fsGetAll('licenses')]);
    const isTrainedStatus=s=>{const v=(s||'').trim();return v!==''&&v!=='-'&&v!=='ยังไม่อบรม';};
    // อ้างอิงใบขับขี่เครือฯ เท่านั้น
    const corpByEmp={};
    allLics.filter(l=>l.license_type==='ใบขับขี่เครือฯ').forEach(l=>{corpByEmp[l.employee_id]=l;});
    const trnByEmp={};
    allTrns.forEach(t=>{
      const k=t.employee_id;
      if(!trnByEmp[k])trnByEmp[k]=[];
      trnByEmp[k].push(t);
    });
    const rows=allEmps.filter(e=>corpByEmp[e.id||e.employee_id]).map(e=>{
      const id=e.id||e.employee_id;
      const corp=corpByEmp[id];
      const trns=(trnByEmp[id]||[]).map(t=>{
        const nd=toDate(t.next_due_date);
        const d=nd?daysUntil(nd):null;
        return{...t,_d:d,_s:calcStatus(d)};
      }).sort((a,b)=>(b.training_date||'').localeCompare(a.training_date||''));
      const latest=trns[0]||null;
      return{id,name:e.full_name,center:e.research_center,trns,latest,
        corpTrainStatus:corp.training_status||'',
        trained:isTrainedStatus(corp.training_status)||trns.length>0,
        due:trns.some(t=>t._s!=='normal')};
    });
    trnData={rows,total:rows.length};
    renderTrnPage(el);
  }catch(e){el.innerHTML=err(e.message);}
}
function renderTrnPage(el){
  const {rows,total}=trnData;
  const trained=rows.filter(r=>r.trained);
  const pending=rows.filter(r=>!r.trained);
  const due=rows.filter(r=>r.due);
  const tabs=[['pending','⏳ ยังไม่อบรม',pending.length],['due','🔁 ครบกำหนดซ้ำ',due.length],['trained','✅ อบรมแล้ว',trained.length]];
  el.innerHTML=`
  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">
    ${kpi('อบรมแล้ว',trained.length,`จาก ${total} คน (ใบเครือฯ)`,'#16A34A','#DCFCE7','✅')}
    ${kpi('ยังไม่อบรม',pending.length,'ต้องจัดอบรม','#D97706','#FEF3C7','⏳')}
    ${kpi('ครบกำหนดอบรมซ้ำ',due.length,'ภายใน 45 วัน/เกินแล้ว','#DC2626','#FEE2E2','🔁')}
  </div>
  <div class="card card-p" style="margin-bottom:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div class="tabs" style="margin-bottom:0;flex:1;min-width:260px">
        ${tabs.map(([v,l,n])=>`<button class="tab-btn${trnTab===v?' active':''}" onclick="setTrnTab('${v}')">${l} (${n})</button>`).join('')}
      </div>
      <button class="btn-primary" style="background:#16A34A" onclick="dlTrnCSV()">⬇️ Export รายชื่อแท็บนี้</button>
    </div>
  </div>
  <div id="trn-list">${trnRows()}</div>`;
}
function trnRows(){
  const {rows}=trnData;
  const list=trnTab==='pending'?rows.filter(r=>!r.trained)
    :trnTab==='due'?rows.filter(r=>r.due).sort((a,b)=>{
      const ad=Math.min(...a.trns.filter(t=>t._s!=='normal').map(t=>t._d??9999));
      const bd=Math.min(...b.trns.filter(t=>t._s!=='normal').map(t=>t._d??9999));
      return ad-bd;
    })
    :rows.filter(r=>r.trained);
  if(!list.length)return empty(trnTab==='pending'?'ทุกคนผ่านการอบรมแล้ว 🎉':trnTab==='due'?'ยังไม่มีใครครบกำหนดอบรมซ้ำ 🎉':'ยังไม่มีข้อมูลการอบรม');
  return list.map(r=>{
    const dueTrn=r.trns.find(t=>t._s!=='normal');
    return`<div class="emp-row" onclick="openTrnEmp('${r.id}')">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="eavatar">${avatarChar(r.name)}</div>

function dlTrnCSV(){
  const {rows}=trnData;
  const list=trnTab==='pending'?rows.filter(r=>!r.trained):trnTab==='due'?rows.filter(r=>r.due):rows.filter(r=>r.trained);
  if(!list.length){alert('ไม่มีรายชื่อในแท็บนี้');return;}
  const tabName={pending:'ยังไม่อบรม',due:'ครบกำหนดอบรมซ้ำ',trained:'อบรมแล้ว'}[trnTab];
  const data=list.map((r,i)=>({ลำดับ:i+1,'ชื่อ-นามสกุล':r.name,ศูนย์วิจัย:r.center,
    สถานะอบรม:r.latest?'มีบันทึกอบรม':(r.trained?r.corpTrainStatus||'อบรมแล้ว':'ยังไม่อบรม'),
    อบรมล่าสุด:r.latest?fdate(r.latest.training_date):'-',
    หลักสูตร:r.latest?.course_name||'-',
    ครบกำหนดถัดไป:r.latest?fdate(r.latest.next_due_date):'-'}));
  const h=Object.keys(data[0]);
  const csv=[h.join(','),...data.map(r=>h.map(k=>`"${r[k]??''}"`).join(','))].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`DLMS_อบรม_${tabName}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}

// ── EXECUTIVE ──
// กราฟเส้นแนวโน้ม compliance จาก snapshot รายเดือน (เขียนโดย GAS ทุกต้นเดือน)
function trendChart(snaps,currentRate){
  const pts=(snaps||[]).filter(s=>s.month&&typeof s.compliance_rate==='number')
    .sort((a,b)=>a.month.localeCompare(b.month)).slice(-12);
  // เติมค่าปัจจุบันเป็นจุดสุดท้าย (เดือนนี้แบบ real-time)
  const nowMonth=new Date().toISOString().slice(0,7);
  if(!pts.length||pts[pts.length-1].month!==nowMonth) pts.push({month:nowMonth,compliance_rate:currentRate,_live:true});
  if(pts.length<2){
    return`<div style="font-size:12.5px;color:#9CA3AF;padding:8px 0">ยังมีข้อมูลไม่พอวาดกราฟ — ระบบจะเก็บค่า compliance อัตโนมัติทุกต้นเดือน (ผ่าน GAS trigger) เดือนถัดไปจะเริ่มเห็นแนวโน้ม<br>ค่าปัจจุบัน: <strong style="color:#16A34A">${currentRate}%</strong></div>`;
  }
  const W=640,H=180,PL=36,PR=14,PT=14,PB=28;
  const iw=W-PL-PR,ih=H-PT-PB;
  const vals=pts.map(p=>p.compliance_rate);
  const yMin=Math.max(0,Math.min(...vals)-10),yMax=100;
  const X=i=>PL+(pts.length===1?iw/2:i/(pts.length-1)*iw);
  const Y=v=>PT+ih-( (v-yMin)/(yMax-yMin||1)*ih );
  const line=pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.compliance_rate).toFixed(1)}`).join(' ');
  const area=line+` L${X(pts.length-1).toFixed(1)},${(PT+ih).toFixed(1)} L${X(0).toFixed(1)},${(PT+ih).toFixed(1)} Z`;
  const grid=[yMin,Math.round((yMin+yMax)/2),yMax].map(v=>`
    <line x1="${PL}" y1="${Y(v)}" x2="${W-PR}" y2="${Y(v)}" stroke="#E8ECF0" stroke-dasharray="3,3"/>
    <text x="${PL-6}" y="${Y(v)+3}" text-anchor="end" font-size="9" fill="#9CA3AF" font-family="Sarabun">${v}%</text>`).join('');
  const thMonth=m=>{const[y,mo]=m.split('-');return['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][+mo-1]||m;};
  const dots=pts.map((p,i)=>`
    <circle cx="${X(i).toFixed(1)}" cy="${Y(p.compliance_rate).toFixed(1)}" r="3.5" fill="${p._live?'#D97706':'#16A34A'}"/>
    <text x="${X(i).toFixed(1)}" y="${Y(p.compliance_rate)-8}" text-anchor="middle" font-size="9.5" font-weight="700" fill="${p._live?'#D97706':'#16A34A'}" font-family="Sarabun">${p.compliance_rate}%</text>
    <text x="${X(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="9" fill="#9CA3AF" font-family="Sarabun">${thMonth(p.month)}</text>`).join('');
  return`<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block">
    ${grid}
    <path d="${area}" fill="rgba(22,163,74,.08)"/>
    <path d="${line}" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg>
  <div class="legend-text" style="font-size:10.5px;margin-top:4px">🟢 ค่าที่บันทึกรายเดือน &nbsp;·&nbsp; 🟠 ค่า ณ ปัจจุบัน (real-time)</div>`;
}

// ── PDF Export: capture #exec-report เป็นภาพแล้วประกอบเป็น PDF (รองรับหลายหน้า) ──
async function downloadExecutivePDF(){
  const btn=document.getElementById('pdf-btn');
  const target=document.getElementById('exec-report');
  if(!target || typeof html2canvas==='undefined' || typeof window.jspdf==='undefined'){
    alert('❌ ไลบรารีสร้าง PDF โหลดไม่สำเร็จ กรุณาลองใหม่');return;
  }
  const originalText=btn.innerHTML;
  btn.disabled=true;
  btn.innerHTML='⏳ กำลังสร้าง PDF...';

  // ── สร้าง clone ที่ความกว้างคงที่แบบ desktop เสมอ (ป้องกันตารางถูกตัดตอนเปิดจากมือถือ) ──
  const REPORT_WIDTH=820;
  const wrapper=document.createElement('div');
  wrapper.style.cssText=`position:fixed;top:0;left:-99999px;width:${REPORT_WIDTH}px;background:#fff;padding:14px;z-index:-1`;
  const clone=target.cloneNode(true);
  wrapper.appendChild(clone);
  document.body.appendChild(wrapper);

  try{
    await new Promise(r=>setTimeout(r,80)); // รอ layout/font settle
    const canvas=await html2canvas(clone,{scale:1.5,useCORS:true,backgroundColor:'#ffffff'});
    document.body.removeChild(wrapper);

    // ── บีบอัดเป็น JPEG แทน PNG เพื่อลดขนาดไฟล์ ──
    const imgData=canvas.toDataURL('image/jpeg',0.85);
    _pdfPreviewCanvas={imgData,w:canvas.width,h:canvas.height};
    showPdfPreview(imgData);
  }catch(e){
    if(wrapper.parentNode) document.body.removeChild(wrapper);
    alert('❌ สร้าง PDF ไม่สำเร็จ: '+e.message);
  }finally{
    btn.disabled=false;
    btn.innerHTML=originalText;
  }
}

// ── แสดงตัวอย่างก่อนดาวน์โหลดจริง ──
function showPdfPreview(imgData){
  const modal=document.createElement('div');
  modal.id='pdf-preview-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML=`
    <div style="background:#fff;border-radius:14px;padding:16px;max-width:520px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4)">
      <div style="font-size:15px;font-weight:700;margin-bottom:4px;color:#111827">📄 ตัวอย่างรายงาน PDF</div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:12px">ตรวจสอบความเรียบร้อยก่อนดาวน์โหลด</div>
      <div style="flex:1;overflow-y:auto;border:1px solid #E8ECF0;border-radius:8px;background:#F0F2F5;padding:8px">
        <img src="${imgData}" style="width:100%;display:block;border-radius:4px">
      </div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button onclick="confirmDownloadPdf()" style="flex:1;padding:12px;background:#1D4ED8;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:Sarabun,sans-serif;font-weight:600">⬇️ ดาวน์โหลด PDF</button>
        <button onclick="document.getElementById('pdf-preview-modal').remove()" style="flex:1;padding:12px;background:#F0F2F5;color:#374151;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:Sarabun,sans-serif">ยกเลิก</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

// ── ยืนยันแล้วค่อยสร้างไฟล์ PDF จริงจาก canvas ที่เตรียมไว้ ──
function confirmDownloadPdf(){
  if(!_pdfPreviewCanvas)return;
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF('p','mm','a4');
  const pageWidth=pdf.internal.pageSize.getWidth();
  const pageHeight=pdf.internal.pageSize.getHeight();
  const imgWidth=pageWidth;
  const imgHeight=_pdfPreviewCanvas.h*imgWidth/_pdfPreviewCanvas.w;
  let heightLeft=imgHeight;
  let position=0;
  pdf.addImage(_pdfPreviewCanvas.imgData,'JPEG',0,position,imgWidth,imgHeight);
  heightLeft-=pageHeight;
  while(heightLeft>0){
    position=heightLeft-imgHeight;
    pdf.addPage();
    pdf.addImage(_pdfPreviewCanvas.imgData,'JPEG',0,position,imgWidth,imgHeight);
    heightLeft-=pageHeight;
  }
  pdf.save(`DLMS_สรุปผู้บริหาร_${new Date().toISOString().slice(0,10)}.pdf`);
  document.getElementById('pdf-preview-modal')?.remove();
}
