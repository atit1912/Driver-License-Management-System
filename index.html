<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A2942">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="DLMS — Driver License Management System">
<title>DLMS — ระบบจัดการใบขับขี่</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<!-- App CSS -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="sidebar-logo-icon">🚗</span>
      <div>
        <div class="sidebar-logo-text">DLMS</div>
        <div class="sidebar-logo-sub">Driver License Management</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div style="padding:14px 18px;border-top:1px solid rgba(255,255,255,.08)">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;border-radius:50%;background:rgba(59,130,246,.3);color:#93C5FD;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700">S</div>
        <div>
          <div style="font-size:13px;font-weight:600;color:#fff">SHE&En Officer</div>
          <div style="font-size:11px;color:rgba(255,255,255,.4)">Administrator</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Top Header -->
  <header class="top-header">
    <div class="top-left">
      <button class="ham-btn" onclick="openSidebar()">☰</button>
      <span class="top-title" id="page-title">หน้าหลัก</span>
    </div>
    <div class="top-right">
      <span class="top-date" id="today-date"></span>
      <button class="dark-btn" id="dark-btn" onclick="toggleDark()" title="เปลี่ยนธีม">🌙</button>
      <button class="notif-btn" onclick="go('notifs')">
        🔔
        <span class="notif-badge" id="notif-badge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page-content" id="content">
    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span class="spinner-text">กำลังโหลด...</span>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottom-nav"></nav>

</div>

<!-- App JS -->
<script src="script.js"></script>
</body>
</html>
