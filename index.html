<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DLMS — ระบบจัดการใบขับขี่</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#F0F2F5;color:#1a1a1a;font-size:14px;-webkit-font-smoothing:antialiased}
button,input,select{font-family:'Sarabun',sans-serif}
body.dark{background:#0F172A;color:#E2E8F0}
body.dark .card,body.dark .kpi,body.dark .emp-row{background:#1E293B;border-color:#334155;color:#E2E8F0}
body.dark .topbar{background:#1E293B;border-color:#334155}
body.dark .sinput,body.dark .fsel{background:#0F172A;border-color:#334155;color:#E2E8F0}
body.dark .fpill{background:#1E293B;border-color:#334155;color:#94A3B8}
body.dark .fpill.active{background:#3B82F6;border-color:#3B82F6;color:#fff}
body.dark .rtable th{background:#0F172A;color:#94A3B8;border-color:#334155}
body.dark .rtable td{border-color:#1E293B;color:#CBD5E1}
body.dark .rtable tr:hover td{background:#334155}
body.dark .tabs{background:#0F172A}
body.dark .tab-btn{background:transparent;color:#64748B}
body.dark .tab-btn.active{background:#1E293B;color:#60A5FA}
body.dark .kpi-label{color:#94A3B8}
body.dark .kpi-sub{color:#64748B}
body.dark .stitle{color:#CBD5E1}
body.dark .ilabel{color:#64748B}
body.dark .ival{color:#CBD5E1}
body.dark .ival.hl{color:#F87171}
body.dark .cbar-track{background:#334155}

.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1a2942;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:40;transition:transform .3s}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:39;-webkit-tap-highlight-color:transparent}
.overlay.show{display:block}
.main{flex:1;margin-left:220px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E8ECF0;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.content{flex:1;padding:20px;padding-bottom:80px;max-width:1100px}

/* Sidebar */
.logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.logo-text{font-weight:700;font-size:15px;color:#fff;line-height:1.1}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4)}
nav.snav{flex:1;padding:12px 8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:2px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:rgba(59,130,246,.25);color:#93C5FD}
.ni-icon{font-size:17px;width:20px;text-align:center}
.ubar{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:8px}
.uavatar{width:32px;height:32px;border-radius:50%;background:rgba(59,130,246,.3);color:#93C5FD;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}

/* Bottom nav mobile */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1a2942;border-top:1px solid rgba(255,255,255,.1);justify-content:space-around;padding:6px 0 8px;z-index:40}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;font-weight:500;color:rgba(255,255,255,.5);border:none;background:none;padding:4px 8px;cursor:pointer;transition:color .15s;font-family:'Sarabun',sans-serif}
.bni.active{color:#93C5FD}
.bni-icon{font-size:21px}

/* Cards */
.card{background:#fff;border-radius:14px;border:1px solid #E8ECF0;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.card-p{padding:18px 20px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:#fff;border-radius:14px;border:1px solid #E8ECF0;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start}
.kpi-label{font-size:11.5px;color:#8896A0;font-weight:500;letter-spacing:.03em;margin-bottom:6px}
.kpi-val{font-size:32px;font-weight:700;line-height:1}
.kpi-sub{font-size:11px;color:#B0BDC8;margin-top:4px}
.kpi-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* Status badge */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;border:1px solid}
.badge-sm{padding:2px 8px;font-size:11px}
.bdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sn{color:#166534;background:#DCFCE7;border-color:#86EFAC}.sn .bdot{background:#16A34A}
.s45{color:#92400E;background:#FEF3C7;border-color:#FCD34D}.s45 .bdot{background:#D97706}
.s30{color:#9A3412;background:#FEE2E2;border-color:#FCA5A5}.s30 .bdot{background:#DC2626}
.s15{color:#7F1D1D;background:#FECACA;border-color:#F87171}.s15 .bdot{background:#EF4444}
.sx{color:#fff;background:#991B1B;border-color:#7F1D1D}.sx .bdot{background:#fff}

/* Alert row */
.alert-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:10px;border:1px solid;flex-wrap:wrap;gap:8px;margin-bottom:6px}

/* Employee */
.emp-row{background:#fff;border-radius:12px;border:1px solid #E8ECF0;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;cursor:pointer;transition:all .15s;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.emp-row:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);border-color:#C7D2DA;transform:translateY(-1px)}
.eavatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#DBEAFE,#BFDBFE);color:#1D4ED8;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;flex-shrink:0}

/* Tabs */
.tabs{display:flex;background:#F0F2F5;border-radius:10px;padding:3px;margin-bottom:14px;gap:3px}
.tab-btn{flex:1;padding:9px 0;border:none;cursor:pointer;font-size:13px;font-weight:500;background:transparent;color:#6B7280;transition:all .2s;border-radius:8px;font-family:'Sarabun',sans-serif}
.tab-btn.active{background:#fff;color:#1D4ED8;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* Form elements */
.sw{position:relative}
.sw .sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:15px;pointer-events:none}
.sinput{width:100%;padding:9px 12px 9px 34px;border:1px solid #E8ECF0;border-radius:10px;font-size:13px;outline:none;background:#FAFBFC;transition:border-color .15s;font-family:'Sarabun',sans-serif}
.sinput:focus{border-color:#3B82F6;background:#fff}
.fsel{padding:8px 12px;border:1px solid #E8ECF0;border-radius:10px;font-size:12.5px;background:#FAFBFC;color:#374151;outline:none;font-family:'Sarabun',sans-serif;cursor:pointer}
.fpill{padding:6px 14px;border:1px solid #E8ECF0;border-radius:20px;font-size:12px;background:#fff;color:#6B7280;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s;font-weight:500}
.fpill.active{background:#1D4ED8;color:#fff;border-color:#1D4ED8}
.fpill:hover:not(.active){background:#F0F2F5;border-color:#C7D2DA}

/* Info grid */
.ig{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ilabel{font-size:10px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.ival{font-size:13px;color:#374151}
.ival.hl{color:#DC2626;font-weight:600}

/* Spinner */
.sw-center{display:flex;flex-direction:column;align-items:center;padding:50px;gap:14px}
.spin{width:34px;height:34px;border-radius:50%;border:3px solid #E8ECF0;border-top-color:#3B82F6;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Section title */
.stitle{font-size:13px;font-weight:600;color:#374151;margin-bottom:14px;display:flex;align-items:center;gap:6px}

/* Table */
.rtable{width:100%;border-collapse:collapse;font-size:12.5px}
.rtable th{padding:9px 12px;text-align:left;font-weight:600;color:#6B7280;border-bottom:2px solid #E8ECF0;background:#F8FAFC;white-space:nowrap}
.rtable td{padding:9px 12px;border-bottom:1px solid #F0F2F5;color:#374151;white-space:nowrap}
.rtable tr:hover td{background:#F8FAFC}

/* Chart bars (CSS only) */
.cbar-wrap{display:flex;flex-direction:column;gap:10px}
.cbar-row{display:flex;align-items:center;gap:10px}
.cbar-label{font-size:11.5px;color:#6B7280;min-width:90px;text-align:right;flex-shrink:0}
.cbar-track{flex:1;height:10px;background:#F0F2F5;border-radius:5px;overflow:hidden;display:flex;gap:2px}
.cbar-seg{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.cbar-num{font-size:11px;color:#9CA3AF;min-width:24px;text-align:right;flex-shrink:0}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:7px;flex:1;min-width:120px}
.dl-item{display:flex;align-items:center;gap:7px;font-size:12px;color:#374151}
.dl-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Btn */
.btn-primary{padding:8px 16px;background:#1D4ED8;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Sarabun',sans-serif;font-weight:500;transition:background .15s;display:inline-flex;align-items:center;gap:5px}
.btn-primary:hover{background:#1E40AF}
.btn-ghost{padding:7px 14px;background:#fff;color:#374151;border:1px solid #E8ECF0;border-radius:8px;font-size:12.5px;cursor:pointer;font-family:'Sarabun',sans-serif;transition:all .15s}
.btn-ghost:hover{background:#F0F2F5}
.back-btn{background:none;border:none;color:#3B82F6;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:0;margin-bottom:14px;font-family:'Sarabun',sans-serif;font-weight:500}
.back-btn:hover{color:#1D4ED8}

/* Notif */
.notif-card{padding:13px 15px;margin-bottom:8px;display:flex;gap:11px;transition:background .15s}
.notif-card.unread{background:#EFF6FF;border-color:#BFDBFE}

/* Responsive */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .bnav{display:flex}
  .content{padding:14px;padding-bottom:80px}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .ig{grid-template-columns:1fr 1fr}
  .donut-wrap{flex-direction:column}
  .chart-grid{grid-template-columns:1fr!important}
  #ham-btn{display:block!important}
}
</style>
</head>
<body>
<div class="app">

<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-icon">🚗</div>
    <div><div class="logo-text">DLMS</div><div class="logo-sub">Driver License Mgmt</div></div>
  </div>
  <nav class="snav" id="snav"></nav>
  <div class="ubar">
    <div class="uavatar">S</div>
    <div><div style="font-size:12px;font-weight:600;color:#fff">SHE&En Officer</div><div style="font-size:10px;color:rgba(255,255,255,.4)">admin</div></div>
  </div>
</aside>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="toggleSidebar()" style="border:none;background:none;font-size:22px;cursor:pointer;color:#6B7280;padding:0;line-height:1;display:none" id="ham-btn">☰</button>
      <div id="page-title" style="font-size:17px;font-weight:700;color:#111827"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:12px;color:#9CA3AF" id="today-label"></div>
      <button onclick="toggleDark()" id="dark-btn" style="border:none;background:none;font-size:20px;cursor:pointer;line-height:1;padding:0" title="Dark mode">🌙</button>
    </div>
  </header>
  <div class="content" id="content">
    <div class="sw-center"><div class="spin"></div><span style="font-size:13px;color:#9CA3AF">กำลังโหลด...</span></div>
  </div>
</div>

<nav class="bnav" id="bnav"></nav>

</div>
<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
const GAS = 'https://script.google.com/macros/s/AKfycbxtK-anMghpiAzNHgX-prdvCd__gMs_sywWh39a-uujDuXK8rGde65Kpjq9Ub5OmTM/exec';

const NAV=[
  {id:'dashboard',icon:'🏠',label:'หน้าหลัก'},
  {id:'employees',icon:'👥',label:'พนักงาน'},
  {id:'reports',  icon:'📊',label:'รายงาน'},
  {id:'notifs',   icon:'🔔',label:'แจ้งเตือน'},
  {id:'settings', icon:'⚙️',label:'ตั้งค่า'},
];
const TITLES={dashboard:'หน้าหลัก',employees:'รายชื่อพนักงาน',reports:'รายงาน',notifs:'การแจ้งเตือน',settings:'ตั้งค่า',executive:'ภาพรวมผู้บริหาร'};
const CENTERS=['ศูนย์วิจัยไร่สาม','ศูนย์ปรับปรุงพันธุ์สัตว์น้ำหาดเจ้า','ศูนย์วิจัยหาดเจ้า','ศูนย์วิจัยหัวกุญแจ','ศูนย์วิจัยเพชรบุรี'];
const CS={'ศูนย์วิจัยไร่สาม':'ไร่สาม','ศูนย์ปรับปรุงพันธุ์สัตว์น้ำหาดเจ้า':'ปรับปรุงฯ','ศูนย์วิจัยหาดเจ้า':'หาดเจ้า','ศูนย์วิจัยหัวกุญแจ':'หัวกุญแจ','ศูนย์วิจัยเพชรบุรี':'เพชรบุรี'};
const SC={
  normal:{cls:'sn', bg:'#DCFCE7',border:'#86EFAC',dot:'#16A34A',label:'ปกติ'},
  '45d': {cls:'s45',bg:'#FEF3C7',border:'#FCD34D',dot:'#D97706',label:'45 วัน'},
  '30d': {cls:'s30',bg:'#FEE2E2',border:'#FCA5A5',dot:'#DC2626',label:'30 วัน'},
  '15d': {cls:'s15',bg:'#FECACA',border:'#F87171',dot:'#EF4444',label:'15 วัน'},
  expired:{cls:'sx',bg:'#991B1B',border:'#7F1D1D',dot:'#fff',   label:'หมดอายุ'},
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let page='dashboard', empList=[], empCache={}, reportData=null, activeStatus='', sidebarOpen=false;
const _cache={}, _CACHE_TTL=5*60*1000;
async function cachedApi(action,params={}){
  const k=action+JSON.stringify(params);
  const now=Date.now();
  if(_cache[k]&&now-_cache[k].t<_CACHE_TTL)return _cache[k].d;
  const d=await api(action,params);
  _cache[k]={d,t:now};
  return d;
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
const days=d=>{if(!d)return null;const n=new Date();n.setHours(0,0,0,0);const e=new Date(d);e.setHours(0,0,0,0);return Math.floor((e-n)/86400000)};
const status=d=>{if(d===null)return 'normal';if(d<0)return 'expired';if(d<=15)return '15d';if(d<=30)return '30d';if(d<=45)return '45d';return 'normal'};
const fdate=d=>{
  if(!d||d==='-'||d==='')return '-';
  try{
    // รองรับ D/M/YYYY และ ISO format
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){
      const[day,mo,yr]=d.split('/');
      return new Date(+yr,+mo-1,+day).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
    }
    const dt=new Date(d);
    if(isNaN(dt))return d;
    // ปรับ timezone offset
    const local=new Date(dt.getTime()+7*60*60*1000);
    return local.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
  }catch{return d}
};
const badge=(s,d,sm)=>{const c=SC[s]||SC.normal;const lbl=d!=null?(d<0?`เกิน ${Math.abs(d)} วัน`:d===0?'วันนี้!':`${d} วัน`):c.label;return`<span class="badge ${c.cls}${sm?' badge-sm':''}"><span class="bdot"></span>${lbl}</span>`};
const spin=(t='กำลังโหลด...')=>`<div class="sw-center"><div class="spin"></div><span style="font-size:13px;color:#9CA3AF">${t}</span></div>`;
const skelKpi=()=>`<div class="kpi-grid">${'<div class="kpi" style="height:90px"><div style="width:60%;height:12px;background:#F0F2F5;border-radius:6px;margin-bottom:12px"></div><div style="width:40%;height:28px;background:#E8ECF0;border-radius:6px"></div></div>'.repeat(4)}</div>`;
const empty=(t='ไม่มีข้อมูล')=>`<div style="text-align:center;padding:40px;color:#9CA3AF"><div style="font-size:36px;margin-bottom:8px">📭</div><div style="font-size:13px">${t}</div></div>`;
const err=e=>`<div style="padding:16px;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;color:#DC2626;font-size:13px">❌ ${e}</div>`;

// ─── API ────────────────────────────────────────────────────────────────────
async function api(action,params={}){
  const u=new URL(GAS);
  u.searchParams.set('action',action);
  u.searchParams.set('params',JSON.stringify(params));
  const r=await fetch(u.toString(),{redirect:'follow'});
  const j=await r.json();
  if(!j.ok)throw new Error(j.message||'API Error');
  return j.data;
}

// ─── NAV ────────────────────────────────────────────────────────────────────
function renderNav(){
  document.getElementById('snav').innerHTML=NAV.map(n=>`<button class="ni${page===n.id?' active':''}" onclick="go('${n.id}')"><span class="ni-icon">${n.icon}</span>${n.label}</button>`).join('');
  document.getElementById('bnav').innerHTML=NAV.map(n=>`<button class="bni${page===n.id?' active':''}" onclick="go('${n.id}')"><span class="bni-icon">${n.icon}</span>${n.label}</button>`).join('');
  document.getElementById('page-title').textContent=TITLES[page]||'DLMS';
  document.getElementById('today-label').textContent=new Date().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'});
  const hb=document.getElementById('ham-btn');
  if(hb)hb.style.display='block';
}
function go(p){page=p;empCache._detail=null;activeStatus='';closeSidebar();renderNav();renderPage()}
function toggleSidebar(){sidebarOpen=!sidebarOpen;document.getElementById('sidebar').classList.toggle('open',sidebarOpen);document.getElementById('overlay').classList.toggle('show',sidebarOpen)}
function closeSidebar(){sidebarOpen=false;document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show')}

// ─── PAGES ──────────────────────────────────────────────────────────────────
function renderPage(){
  const el=document.getElementById('content');
  if(page==='dashboard')pgDashboard(el);
  else if(page==='employees'&&!empCache._detail)pgEmployees(el);
  else if(page==='employees'&&empCache._detail)pgDetail(el,empCache._detail);
  else if(page==='reports')pgReports(el);
  else if(page==='notifs')pgNotifs(el);
  else if(page==='settings')pgSettings(el);
  else if(page==='executive')pgExecutive(el);
}

// ── DASHBOARD ──
async function pgDashboard(el){
  el.innerHTML=skelKpi()+spin('กำลังดึงข้อมูล...');
  try{
    const[s,centers]=await Promise.all([cachedApi('dashboard.summary'),cachedApi('dashboard.centerStats')]);
    el.innerHTML=`
    <div class="kpi-grid">
      ${kpi('พนักงานทั้งหมด',s.total_employees,'5 ศูนย์วิจัย','#1D4ED8','#DBEAFE','👥')}
      ${kpi('ใกล้หมดอายุ',s.near_expiry,'ภายใน 45 วัน','#D97706','#FEF3C7','⚠️')}
      ${kpi('หมดอายุแล้ว',s.expired,'ต้องดำเนินการด่วน','#DC2626','#FEE2E2','🚨')}
      ${kpi('Compliance',s.compliance_rate+'%','ใบขับขี่ปกติ','#16A34A','#DCFCE7','✅')}
    </div>
    <div class="chart-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">

function kpi(label,val,sub,color,bg,icon){return`<div class="kpi"><div class="kpi-top"><div><div class="kpi-label">${label}</div><div class="kpi-val" style="color:${color}">${val}</div><div class="kpi-sub">${sub}</div></div><div class="kpi-ico" style="background:${bg}">${icon}</div></div></div>`}
function centerBars(centers){
  return centers.map(c=>{
    const tot=c.total||1;
    const pw=n=>Math.round(n/tot*100)+'%';
    return`<div class="cbar-row">
      <div class="cbar-label">${CS[c.center]||c.center}</div>
      <div class="cbar-track">
        <div class="cbar-seg" style="width:${pw(c.normal)};background:#16A34A"></div>
        <div class="cbar-seg" style="width:${pw(c.near_expiry)};background:#D97706"></div>
        <div class="cbar-seg" style="width:${pw(c.expired)};background:#DC2626"></div>
      </div>
      <div class="cbar-num">${c.total}</div>
    </div>`}).join('')
}
function donut(ls){
  const items=[
    {label:'ปกติ',   val:ls.normal||0, color:'#16A34A'},
    {label:'45 วัน', val:ls['45d']||0, color:'#D97706'},
    {label:'30 วัน', val:ls['30d']||0, color:'#DC2626'},
    {label:'15 วัน', val:ls['15d']||0, color:'#EF4444'},
    {label:'หมดอายุ',val:ls.expired||0,color:'#7F1D1D'},
  ].filter(i=>i.val>0);
  const total=items.reduce((a,b)=>a+b.val,0)||1;
  let ang=-90,paths='';
  items.forEach(item=>{
    const deg=item.val/total*360;
    const r=55,cx=70,cy=70;
    const x1=cx+r*Math.cos(ang*Math.PI/180),y1=cy+r*Math.sin(ang*Math.PI/180);
    ang+=deg;
    const x2=cx+r*Math.cos(ang*Math.PI/180),y2=cy+r*Math.sin(ang*Math.PI/180);
    const lg=deg>180?1:0;
    paths+=`<path d="M${cx},${cy} L${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)} Z" fill="${item.color}"/>`;
  });
  return`<div class="donut-wrap">
    <svg viewBox="0 0 140 140" style="width:130px;flex-shrink:0">
      ${paths}
      <circle cx="70" cy="70" r="32" fill="white"/>
      <text x="70" y="66" text-anchor="middle" font-size="16" font-weight="700" fill="#111" font-family="Sarabun">${total}</text>
      <text x="70" y="80" text-anchor="middle" font-size="10" fill="#9CA3AF" font-family="Sarabun">ใบขับขี่</text>
    </svg>
    <div class="donut-legend">${items.map(i=>`<div class="dl-item"><div class="dl-dot" style="background:${i.color}"></div><span>${i.label}: <strong>${i.val}</strong></span></div>`).join('')}</div>
  </div>`
}

async function loadReport(type){
  const el=document.getElementById('rresult');
  el.innerHTML=spin('กำลังสร้างรายงาน...');
  try{
    const actions={license:'reports.licenseExpiry',training:'reports.trainingDue',full:'reports.fullExport'};
    const res=await api(actions[type]);
    const data=res.data||[];
    reportData=data;
    if(!data.length){el.innerHTML=empty('ไม่มีรายการในรายงานนี้ 🎉');return}
    const headers=Object.keys(data[0]).slice(0,8);
    el.innerHTML=`<div class="card card-p">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">

      </div>
      <div style="overflow-x:auto;border-radius:8px;border:1px solid #E8ECF0">
        <table class="rtable">
          <thead><tr>${headers.map(h=>`<th>${h.replace(/_/g,' ')}</th>`).join('')}</tr></thead>
          <tbody>${data.slice(0,30).map(r=>`<tr>${headers.map(h=>`<td>${r[h]??'-'}</td>`).join('')}</tr>`).join('')}</tbody>
        </table>
        ${data.length>30?`<div style="padding:10px;text-align:center;font-size:11px;color:#9CA3AF">แสดง 30 จาก ${data.length} รายการ — ดาวน์โหลด CSV เพื่อดูทั้งหมด</div>`:''}
      </div>
    </div>`;
  }catch(e){el.innerHTML=err(e.message)}
}
function dlCSV(){
  if(!reportData?.length)return;
  const h=Object.keys(reportData[0]);
  const rows=reportData.map(r=>h.map(k=>`"${r[k]??''}"`).join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download=`DLMS_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ─── DARK MODE ──────────────────────────────────────────────────────────────
function toggleDark(){
  const dark=document.body.classList.toggle('dark');
  document.getElementById('dark-btn').textContent=dark?'☀️':'🌙';
  localStorage.setItem('dlms-dark',dark?'1':'0');
}
if(localStorage.getItem('dlms-dark')==='1'){
  document.body.classList.add('dark');
  setTimeout(()=>{const b=document.getElementById('dark-btn');if(b)b.textContent='☀️'},100);
}

// ─── EDIT LICENSE ──────────────────────────────────────────────────────────
function editLicense(licId,empId,licType,licNo,expiryDate){
  const currentExpiry = fdate(expiryDate);
  const modal=document.createElement('div');
  modal.id='edit-modal';
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML=`
    <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="font-size:16px;font-weight:700;margin-bottom:4px">✏️ แก้ไขใบขับขี่</div>
      <div style="font-size:12px;color:#6B7280;margin-bottom:16px">${licType} · ${licNo}</div>
      <div style="margin-bottom:14px">
        <div class="ilabel" style="margin-bottom:4px">วันหมดอายุใหม่ (ปี ค.ศ.)</div>
        <input type="date" id="new-expiry" style="width:100%;padding:10px;border:1px solid #E8ECF0;border-radius:8px;font-size:14px;font-family:Sarabun,sans-serif;outline:none">
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="submitEditLicense('${licId}','${empId}')" style="flex:1;padding:11px;background:#1D4ED8;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:Sarabun,sans-serif;font-weight:600">💾 บันทึก</button>
        <button onclick="document.getElementById('edit-modal').remove()" style="flex:1;padding:11px;background:#F0F2F5;color:#374151;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:Sarabun,sans-serif">ยกเลิก</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}
async function submitEditLicense(licId,empId){
  const val=document.getElementById('new-expiry').value;
  if(!val){alert('กรุณาเลือกวันหมดอายุ');return}
  try{
    await api('licenses.upsert',{license_id:licId,employee_id:empId,expiry_date:val});
    document.getElementById('edit-modal').remove();
    // clear cache แล้ว reload
    Object.keys(_cache).forEach(k=>delete _cache[k]);
    alert('✅ บันทึกสำเร็จ');
    openEmp(empId);
  }catch(e){alert('❌ '+e.message)}
}

// ─── EXECUTIVE REPORT ────────────────────────────────────────────────────────
// เพิ่มใน NAV
NAV.push({id:'executive',icon:'📈',label:'ภาพรวมผู้บริหาร'});

async function pgExecutive(el){
  el.innerHTML=spin('กำลังสร้างรายงานผู้บริหาร...');
  try{
    const[sum,centers,nearExpiry]=await Promise.all([
      cachedApi('dashboard.summary'),
      cachedApi('dashboard.centerStats'),
      cachedApi('licenses.nearExpiry',{days:45}),
    ]);
    const arr=Array.isArray(nearExpiry)?nearExpiry:(nearExpiry?.data||[]);
    const expired=arr.filter(l=>l.expiry_status==='expired'||l.days_remaining<0);
    const crit=arr.filter(l=>l.days_remaining>=0&&l.days_remaining<=15);
    const warn30=arr.filter(l=>l.days_remaining>15&&l.days_remaining<=30);
    const warn45=arr.filter(l=>l.days_remaining>30&&l.days_remaining<=45);

    el.innerHTML=`
    <div style="display:flex;flex-direction:column;gap:16px">

      <!-- Header -->
      <div class="card card-p" style="background:linear-gradient(135deg,#1a2942,#1D4ED8);border:none">
        <div style="color:#fff">
          <div style="font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px">Executive Dashboard</div>
          <div style="font-size:20px;font-weight:700">DLMS — ภาพรวมผู้บริหาร</div>
          <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:4px">${new Date().toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric',weekday:'long'})}</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px">
          ${[
            ['พนักงานทั้งหมด',sum.total_employees,'คน','rgba(255,255,255,.15)','#fff'],
            ['Compliance Rate',sum.compliance_rate+'%','ของใบทั้งหมด','rgba(34,197,94,.2)','#4ADE80'],
            ['ต้องดำเนินการ',(sum.near_expiry+sum.expired),'รายการ','rgba(239,68,68,.2)','#F87171'],
          ].map(([l,v,u,bg,c])=>`<div style="background:${bg};border-radius:10px;padding:12px;text-align:center">
            <div style="font-size:22px;font-weight:700;color:${c}">${v}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.7)">${l}</div>
            <div style="font-size:10px;color:rgba(255,255,255,.5)">${u}</div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Risk Summary -->
      <div class="card card-p">
        <div class="stitle">🚦 สรุปความเสี่ยง</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
          ${[
            ['⛔','หมดอายุแล้ว',expired.length,'#991B1B','#FEE2E2'],
            ['🔴','เหลือ ≤ 15 วัน',crit.length,'#DC2626','#FECACA'],
            ['🟠','เหลือ 16-30 วัน',warn30.length,'#D97706','#FEF3C7'],
            ['🟡','เหลือ 31-45 วัน',warn45.length,'#CA8A04','#FEF9C3'],
          ].map(([ic,l,v,c,bg])=>`<div style="background:${bg};border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px">
            <span style="font-size:24px">${ic}</span>
            <div><div style="font-size:22px;font-weight:700;color:${c}">${v}</div><div style="font-size:11px;color:${c}">${l}</div></div>
          </div>`).join('')}
        </div>
      </div>

      <!-- Center Table -->
      <div class="card card-p">
        <div class="stitle">🏢 สรุปตามศูนย์วิจัย</div>
        <div style="overflow-x:auto">
          <table class="rtable">
            <thead><tr>
              <th>ศูนย์วิจัย</th><th style="text-align:center">พนักงาน</th>
              <th style="text-align:center">ปกติ</th><th style="text-align:center">ใกล้หมด</th>
              <th style="text-align:center">หมดอายุ</th><th style="text-align:center">Compliance</th>
            </tr></thead>
            <tbody>
              ${centers.map(c=>{
                const tot=(c.normal+c.near_expiry+c.expired)||1;
                const comp=Math.round(c.normal/tot*100);
                const compColor=comp>=90?'#16A34A':comp>=70?'#D97706':'#DC2626';
                return`<tr>
                  <td style="font-weight:500">${c.center.replace('ศูนย์วิจัย','').replace('ศูนย์ปรับปรุงพันธุ์สัตว์น้ำหาดเจ้า','ปรับปรุงพันธุ์ฯ')}</td>
                  <td style="text-align:center">${c.total}</td>
                  <td style="text-align:center;color:#16A34A;font-weight:600">${c.normal}</td>
                  <td style="text-align:center;color:#D97706;font-weight:600">${c.near_expiry}</td>
                  <td style="text-align:center;color:#DC2626;font-weight:600">${c.expired}</td>
                  <td style="text-align:center"><span style="font-weight:700;color:${compColor}">${comp}%</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Urgent List -->
      ${expired.length>0||crit.length>0?`
      <div class="card card-p">
        <div class="stitle">⚠️ รายการเร่งด่วน (ต้องดำเนินการ)</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${[...expired,...crit].slice(0,10).map(l=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:${l.days_remaining<0?'#FEE2E2':'#FECACA'};border-radius:8px;flex-wrap:wrap;gap:6px">
              <div>
                <div style="font-size:13px;font-weight:600;color:#7F1D1D">${l.employee_name||l.employee_id}</div>
                <div style="font-size:11px;color:#991B1B">${l.license_type} · ${l.research_center||''}</div>
              </div>
              ${badge(l.expiry_status,l.days_remaining,true)}
            </div>`).join('')}
        </div>
      </div>`:''}

      <!-- Export Button -->
      <button onclick="exportExec()" class="btn-primary" style="width:100%;padding:14px;font-size:14px;justify-content:center;border-radius:10px">
        📊 Export รายงานผู้บริหาร (CSV)
      </button>

    </div>`;
  }catch(e){el.innerHTML=err(e.message)}
}

function exportExec(){
  alert('กำลังดาวน์โหลด — ใช้ปุ่ม "รายงานรวมทั้งหมด" ในหน้ารายงานครับ');
}
